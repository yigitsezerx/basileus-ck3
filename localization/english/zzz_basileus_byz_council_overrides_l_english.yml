 # Greek Tooltip Descriptions
 minister_personnel_greek_desc: "The [logothetes_kanikleiou|E] is the minister in charge of all matters related to [appointments|E] and can greatly impact the [candidate_score|E] of other [characters|E].\n\n#F The Keeper of the Inkstand was the keeper of the imperial inkstand and head of the imperial chancellery, responsible for drafting documents and managing the bureaucracy.#!"
 councillor_steward_greek_desc: "The [logothetes_genikou|E] is the minister in charge of general taxation and the state budget.\n\n#F The Logothete of the Genicon oversaw the assessment and collection of taxes across the entire empire, ensuring the stability of the imperial finances.#!"
 councillor_marshal_greek_desc: "The [stratelates|E] is the minister in charge of the field armies and military strategy.\n\n#F The Stratēlatēs was a supreme military rank, functionally equivalent to the Master of Soldiers, responsible for the defense of the imperial borders.#!"
 councillor_court_chaplain_greek_desc: "The [patriarch|E] is the minister in charge of religious and spiritual affairs.\n\n#F The Ecumenical Patriarch of Constantinople is the highest spiritual authority, working in [symphonia|E] with the Emperor to safeguard the traditions of the Church.#!"
 minister_justice_greek_desc: "The [logothetes_praitoriou|E] is the minister in charge of legal affairs and assisting the Emperor to maintain a righteous rule.\n\n#F As the administrator of the Praetorium, this official was responsible for the judicial system and the maintenance of order within the capital and beyond.#!"
 minister_works_greek_desc: "The [eparchos|E] is the minister in charge of construction and development throughout the [realm|E], and may start [great_projects|E].\n\n#F The Eparch of Constantinople held supreme judicial and administrative authority over the Queen of Cities, its markets, its guilds, and its public infrastructure.#!"
 minister_grandmarshal_greek_desc: "The [megas_domestikos|E] is the highest ranking commander in the [realm|E] and commands an [army|E] of [title_men_at_arms|E].\n\n#F The [domestikos_ton_scholon|E] was originally the commander of the elite tagmata guard regiments, before becoming the supreme commander of the field armies in the East and West.#!"
 
 councillor_chancellor_greek_desc: "The [logothetes_dromou|E] is the head of the imperial household and oversaw all palace ceremonies and foreign diplomacy.\n\n#F The Logothete of the Course was responsible for the public post, internal security, and foreign affairs, acting as the main point of contact for foreign ambassadors.#!"
 councillor_spymaster_greek_desc: "The [parakoimomenos|E] is the minister in charge of the Emperor's security and intelligence.\n\n#F The "One who sleeps near" was often the most powerful official in the palace, acting as a trusted guardian and personal agent of the Emperor.#!"
