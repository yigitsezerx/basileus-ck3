 # Backup copies of original Chinese/Generic texts (Cleaned up of Secretary references for fallback safety)
 game_concept_dominus_minister_grand_chancellor_tgp_desc: "The Grand Chancellor is the highest ranking minister and is in charge of diplomatic matters.\n\n$minister_grand_chancellor_action_breakdown$"
 game_concept_dominus_minister_censor_tgp_desc: "The Censor is the minister in charge of matters of intrigue and intelligence.\n\n$minister_censor_action_breakdown$"
 game_concept_dominus_minister_grand_marshal_tgp_desc: "The Grand Marshal is the highest ranking commander in the realm and commands an Army of Title Men-at-Arms.\n\n$minister_grand_marshal_action_breakdown$"
 game_concept_dominus_minister_of_personnel_tgp_desc: "The Minister of Personnel is the minister in charge of all matters related to appointments and can greatly impact the Candidate Score of other characters.\n\n$minister_of_personnel_action_breakdown$"
 game_concept_dominus_minister_of_revenue_tgp_desc: "The Minister of Revenue is the minister in charge of taxation and aids the Emperor with the treasury.\n\n$minister_of_revenue_action_breakdown$"
 game_concept_dominus_minister_of_rites_tgp_desc: "The Minister of Rites is the minister in charge of religious and spiritual affairs.\n\n$minister_of_rites_action_breakdown$"
 game_concept_dominus_minister_of_war_tgp_desc: "The Minister of War is the minister in charge of the administration and management of troops.\n\n$minister_of_war_action_breakdown$"
 game_concept_dominus_minister_of_justice_tgp_desc: "The Minister of Justice is the minister in charge of legal affairs and assisting the Emperor to maintain a righteous rule.\n\n$minister_of_justice_action_breakdown$"
 game_concept_dominus_minister_of_works_tgp_desc: "The Minister of Works is the minister in charge of construction and development throughout the realm, and may start Great Projects.\n\n$minister_of_works_action_breakdown$"

 # Vanilla Backups for standard positions
 game_concept_chancellor_desc_vanilla: "The Chancellor is the [councillor|E] in charge of diplomatic efforts, both inside and outside the [realm|E]."
 game_concept_steward_desc_vanilla: "The Steward is the [councillor|E] in charge of [domain|E] administration, for example matters of [taxation|E], [culture|E] and [development|E]."
 game_concept_marshal_desc_vanilla: "The Marshal is your chief [commander|E] and the [councillor|E] in charge of military matters in general."
 game_concept_spymaster_desc_vanilla: "The Spymaster is the [councillor|E] in charge of intelligence and [schemes|E]."
 game_concept_court_chaplain_desc_vanilla: "The [court_chaplain|E] is the [councillor|E] in charge of religious matters in the [realm|E]."

 minister_grand_chancellor_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Use the [GetDecision('favored_movement_consults_heaven_decision').GetName|V] [decision|E]\n$BULLET$Invite any type of [courtier|E] with the [GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V] [decision|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options, and at a reduced cost\n$BULLET$Start the [GetGreatProjectType('minister_compel_religious_uniformity').GetName|V] [great_project|E]#!#!"
 minister_censor_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Use #V $censor_find_secrets_interaction$#! [interaction|E] to find [secrets|E] in [vassal|E] [courts|E], which you can use to get a [gold_i][gold|E] reward from your [liege|E] or gain [hooks|E]\n$BULLET$Doing [blackmail|E] will trigger #V '$catalyst_minister_blackmailed$'#! [dynastic_cycle_catalyst|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"
 minister_grand_marshal_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Start the #V Grand Campaign#! [great_project|E]\n$BULLET$Start the [GetGreatProjectType('construct_great_barracks').GetName|V] [great_project|E]\n$BULLET$Use #V $CHINA_SEIZE_COUNTY_CB_NAME$#! and #V $CHINA_SEIZE_DUCHY_CB_NAME$#! [casus_bellis|E] in [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName] and [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName] [dynastic_cycle_eras_short|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"
 minister_of_personnel_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Use #V $force_governor_removal_interaction$#! [interaction|E] to fire [governors|E] regardless of the [GetLawGroup('celestial_retirement_law').GetName] [law|E]\n$BULLET$Invite any type of [courtier|E] with the [GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V] [decision|E]\n$BULLET$Compel acceptance of the #V $offer_courtier_interaction$#! and #V $demand_courtier_interaction$#! [interactions|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options, and at a reduced cost#!#!"
 minister_of_revenue_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Aid [vassals|E] who can #V $celestial_request_treasury_interaction$#!\n$BULLET$Use the [GetDecision('tgp_suggest_budget_change_decision').GetName|V] [decision|E]\n$BULLET$Start the [GetGreatProjectType('minister_project_conduct_census').GetName|V] [great_project|E]\n$BULLET$Use #V $pay_treasury_debt_interaction$#! [interaction|E] to pay [treasury_debt|E] of [civilian_governors|E] triggering #V '$catalyst_cleared_treasury_debt$'#! [dynastic_cycle_catalyst|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"
 minister_of_rites_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Start the [GetGreatProjectType('minister_project_culture').GetName|V] [great_project|E]\n$BULLET$Start the [GetGreatProjectType('minister_compel_religious_uniformity').GetName|V] [great_project|E]\n$BULLET$Aid [vassals|E] in hosting [examinations|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options\n$BULLET$#V $demand_conversion_minister_rites_interaction$#! on [characters|E] of [faith_hostile|E] or [faith_evil|E] [faiths|E]#!#!"
 minister_of_war_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Send aid to [vassals|E] at [war|E] who can #V $celestial_request_military_aid_interaction$#!\n$BULLET$Order [military_governors|E] to join the [wars|E] of other [governors|E]\n$BULLET$Start the [GetGreatProjectType('minister_project_train_troops').GetName|V] [great_project|E]\n$BULLET$Use #V $pay_treasury_debt_interaction$#! [interaction|E] to pay [treasury_debt|E] of [military_governors|E] triggering #V '$catalyst_cleared_treasury_debt$'#! [dynastic_cycle_catalyst|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"
 minister_of_justice_action_breakdown_tgp: "#indent_newline:4 #weak The minister can, for example:\n$BULLET$Start the [GetGreatProjectType('minister_project_establish_control').GetName|V] [great_project|E]\n$BULLET$Use #V $imprison_interaction$#! [interaction|E] on [vassals|E] and [courtiers|E], who cannot refuse\n$BULLET$Use #V $pardon_interaction$#! [interaction|E] on [characters|E] who have committed [crimes|E]\n$BULLET$Use $censor_find_secrets_interaction$ [interaction|E] to find [secrets|E] in [vassal|E] [courts|E] and [imprison|E] or pardon known [criminals|E]\n$BULLET$Exposing [secrets|E] will trigger $catalyst_minister_exposed_secret$ [dynastic_cycle_catalyst|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"
 minister_of_works_action_breakdown_tgp: "#indent_newline:4 #weak The [praefectus|E] can, for example:\n$BULLET$Start the [GetGreatProjectType('minister_project_development').GetName|V] [great_project|E]\n$BULLET$Start the [GetGreatProjectType('grand_canals').GetName|V] [great_project|E]\n$BULLET$Start the [GetGreatProjectType('great_wall').GetName|V] [great_project|E]\n$BULLET$Can construct [buildings|E] and [holdings|E] inside the [realm|E]\n$BULLET$Can construct [buildings|E] and [holdings|E] inside [tributaries|E] of the [basileus|E]\n$BULLET$Access special #V $influence_meritorious_career_interaction$#! [interaction|E] options#!#!"

