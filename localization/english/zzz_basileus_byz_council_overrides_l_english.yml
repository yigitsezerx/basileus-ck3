 # Byzantine Flavor Descriptions (Historic Tooltips)
 game_concept_dominus_minister_grand_chancellor_byz_desc: "The [logothetes|E] is the highest ranking minister and is in charge of diplomatic matters.\n\n#F The Logothetes ton Sekreton oversaw all civil departments, acting as a de facto prime minister and the Emperor's most trusted advisor in the later Empire.#!"
 game_concept_dominus_minister_censor_byz_desc: "The [logothetes|E] tou Dromou is the minister in charge of matters of intrigue and intelligence.\n\n#F The 'Logothete of the Course' was responsible for the public post, internal security, and foreign affairs. They were the main point of contact for foreign ambassadors.#! \n\nBeware of having a disloyal Logothetes, for they can easily conceal and participate in [schemes|E] against you and your [close_family|E]!"
 game_concept_dominus_minister_grand_marshal_byz_desc: "The [domestic_schools|E] is the highest ranking commander in the [realm|E] and commands an [army|E] of [title_men_at_arms|E].\n\n#F Originally the commander of the elite tagmata guard regiments, the Domesticus became the supreme commander of the field armies in the East and West.#!"
 game_concept_dominus_minister_of_personnel_byz_desc: "The [magister_officiorum|E] is the minister in charge of all matters related to [appointments|E] and can greatly impact the [candidate_score|E] of other [characters|E].\n\n#F The Master of Offices was the head of the imperial civil service, overseeing the secretariats, the palace guard, and the official state ceremonies.#!"
 game_concept_dominus_minister_of_revenue_byz_desc: "The [sakellarios|E] is the minister in charge of [taxation|E] and aids the Emperor with the [treasury|E].\n\n#F The Sakellarios served as the general comptroller of the empire, with the power to audit all departments and oversee the imperial treasury.#!"
 game_concept_dominus_minister_of_rites_byz_desc: "The [patriarch|E] is the minister in charge of religious and spiritual affairs, and can assist [governors|E] in hosting [examinations|E].\n\n#F The Ecumenical Patriarch of Constantinople is the spiritual leader of the Orthodox world. In the concept of [symphonia|E], the Emperor and Patriarch work together as the two heads of Christendom.#!"
 game_concept_dominus_minister_of_war_byz_desc: "The [stratelates|E] is your chief [commander|E] and the [councillor|E] in charge of military matters in general.\n\n#F The 'leader of the army' was the supreme military commander of the Roman and Byzantine field armies. In the middle Byzantine era, this title was used for the highest-ranking generals.#!"
 game_concept_dominus_minister_of_justice_byz_desc: "The [quaestor|E] is the minister in charge of legal affairs and assisting the Emperor to maintain a righteous rule.\n\n#F The Quaestor was the chief legal officer of the Empire, responsible for drafting imperial laws and overseeing the administration of the judicial system.#!"
 game_concept_dominus_minister_of_works_byz_desc: "The [praefectus|E] is the minister in charge of construction and development throughout the [realm|E], and may start [great_projects|E].\n\n#F The [eparch|E] of Constantinople held supreme judicial and administrative authority over the capital city, its markets, its guilds, and its public infrastructure.#!"
 
 # Byzantine Standard Council Flavors
 game_concept_dominus_councillor_spymaster_byz_desc: "The [praepositus|E] is the head of the imperial household and oversaw all palace ceremonies.\n\n#F The Lord Chamberlain was often a trusted eunuch who acted as the Emperor's closest personal confidant and gatekeeper to the imperial presence.#!"
 game_concept_dominus_councillor_steward_byz_desc: "The [logothetes|E] of the Genicon is the minister in charge of general taxation and the state budget.\n\n#F The Logothete of the Genicon oversaw the assessment and collection of taxes across the entire empire, ensuring the stability of the imperial finances.#!"
 game_concept_dominus_councillor_marshal_byz_desc: "The [stratelates|E] is a supreme military commander and chief administrative officer of the armies.\n\n#F The Master of Soldiers was a traditional Roman rank that survived as the Stratēlatēs, representing the Emperor's authority over the field armies.#!"
 game_concept_dominus_councillor_chancellor_byz_desc: "The [logothetes|E] of the Drome is the minister in charge of the public post, intelligence, and foreign diplomacy.\n\n#F The Logothete of the Course was the primary point of contact for foreign ambassadors and oversaw the security of the empire's communication networks.#!"
 game_concept_dominus_councillor_court_chaplain_byz_desc: "The [patriarch|E] is the spiritual leader of the Orthodox world and the Emperor's partner in the governance of Christendom.\n\n#F The Ecumenical Patriarch of Constantinople represents the highest spiritual authority in the Empire, working in [symphonia|E] with the Emperor to guide the faithful.#!"

