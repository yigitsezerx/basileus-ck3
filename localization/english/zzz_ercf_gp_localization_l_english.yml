 # Byzantine Projects
 great_project_type_great_wall_byz:0 "Renovate the Theodosian Walls"
 great_project_type_great_wall_desc_byz:0 "The [theodosian_walls|E] are the ultimate defense of the Roman capital. Maintaining them ensures the city remains the 'Queen of Cities' and impregnable to all foes."
 
 # Regional Projects
 great_project_type_via_egnatia:0 "Renovate the Via Egnatia"
 great_project_type_via_egnatia_desc:0 "The Via Egnatia is the primary artery of the Balkans, connecting Constantinople to the Adriatic. Restoring it ensures the swift movement of troops and trade across the European provinces."
 
 great_project_type_fortify_anatolia_byz:0 "Fortify the Anatolian Frontier"
 great_project_type_fortify_anatolia_byz_desc:0 "The Anatolian frontier is the shield of the Empire against the incursions from the east. Strengthening the border forts and beacon systems ensures early warning and defense."

